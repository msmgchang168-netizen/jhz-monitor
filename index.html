<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JHZ-ESP32E Mobile (40組秒級排程版)</title>
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.jsdelivr.net/npm/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #38bdf8; --accent: #f43f5e; --on: #22c55e; --off: #475569; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .container { max-width: 480px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .status-box { text-align: center; padding: 10px; margin-bottom: 10px; border-radius: 10px; font-size: 0.9rem; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .data-item { background: #0f172a; padding: 12px; border-radius: 12px; border-left: 4px solid var(--text); user-select: none; -webkit-user-select: none; cursor: pointer; }
        
        .ch-item { background:#0f172a; padding:10px; border-radius:12px; text-align:center; user-select: none; -webkit-user-select: none; cursor: pointer; }
        
        .dot { width: 22px; height: 22px; border-radius: 50%; background: var(--off); margin: 0 auto 8px; transition: 0.3s; }
        .dot.active { background: var(--on); box-shadow: 0 0 15px var(--on); }
        .btn-group { display: flex; gap: 8px; margin-top: 8px; }
        
        .btn-toggle { flex: 1; border: none; padding: 12px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-toggle.state-off { background: #475569; } 
        .btn-toggle.state-on { background: var(--accent); } 
        
        .label-ch { font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; display: block; }
        .btn-setting { background: #475569; padding: 4px 10px; font-size: 0.8rem; border-radius: 6px; width: auto; flex: none; border: none; color: white; cursor: pointer; }
        .btn-logout { background: #ef4444; padding: 4px 10px; font-size: 0.8rem; border-radius: 6px; width: auto; flex: none; border: none; color: white; cursor: pointer; }
        
        /* 排程專用樣式 */
        .sched-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .btn-add { background: #22c55e; padding: 6px 12px; font-size: 0.85rem; border-radius: 6px; border: none; color: white; font-weight: bold; cursor: pointer; }
        .sched-list { max-height: 500px; overflow-y: auto; } 
        .sched-item { background: #0f172a; border-radius: 10px; padding: 12px; margin-bottom: 10px; font-size: 0.85rem; border-left: 4px solid #a855f7; position: relative; }
        .sched-time-row { display: flex; gap: 10px; margin-bottom: 8px; }
        .sched-time-box { flex: 1; }
        .sched-time-box label { font-size: 0.75rem; color: #94a3b8; display: block; margin-bottom: 2px; }
        .sched-time-box input[type="text"] { width: 100%; background: #1e293b; border: 1px solid #475569; color: white; border-radius: 6px; padding: 6px; text-align: center; box-sizing: border-box; font-size: 0.85rem; }
        
        /* 修正通道秒數排版 */
        .sched-ch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; padding-top: 8px; border-top: 1px dashed #334155; }
        .sched-ch-cell { display: flex; flex-direction: column; gap: 2px; }
        .sched-ch-cell label { font-size: 0.75rem; color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sched-ch-cell input[type="number"] { width: 100%; background: #1e293b; border: 1px solid #475569; color: #22c55e; border-radius: 6px; padding: 4px 6px; box-sizing: border-box; font-size: 0.85rem; font-weight: bold; }

        .btn-del { position: absolute; top: 10px; right: 10px; background: #ef4444; border: none; color: white; font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; cursor: pointer; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 18px; width: 85%; max-width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .modal h3 { margin-top: 0; color: var(--text); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 4px; }
        .form-group input[type="text"], .form-group input[type="password"], .form-group input[type="number"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        .checkbox-group { display: flex; align-items: center; gap: 6px; font-size: 0.9rem; margin: 15px 0; }
        .modal-btns { display: flex; gap: 10px; }
        .btn-primary { background: #22c55e; border: none; color: white; padding: 10px; border-radius: 8px; flex: 1; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: #475569; border: none; color: white; padding: 10px; border-radius: 8px; flex: 1; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--text); margin-bottom:5px;">JHZ-ESP32E 監控終端</h2>
    
    <div id="conn-stat" class="status-box" style="background: #334155;">
        <span id="stat-text">尚未設定連線</span>
        <button class="btn-setting" onclick="openModal()">設定</button>
        <button id="btn-logout-ui" class="btn-logout" style="display: none;" onclick="logout()">登出</button>
    </div>

    <div class="card">
        <div class="grid" id="data-grid">
            <div style="grid-column: span 2; text-align:center; color:#475569;">等待首筆數據...</div>
        </div>
    </div>

    <div class="card" style="display:flex; justify-content:space-around;">
        <div style="text-align:center;"><div id="in0" class="dot"></div>IN1</div>
        <div style="text-align:center;"><div id="in1" class="dot"></div>IN2</div>
        <div style="text-align:center;"><div id="in2" class="dot"></div>IN3</div>
        <div style="text-align:center;"><div id="in3" class="dot"></div>IN4</div>
    </div>

    <div class="card" style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div class="ch-item" id="ch-box-0"
             onmousedown="handleChPressStart(0)" onmouseup="handleChPressEnd()" onmouseleave="handleChPressEnd()"
             ontouchstart="handleChPressStart(0)" ontouchend="handleChPressEnd()">
            <span class="label-ch" id="ch-lbl-0">通道 1</span>
            <div class="btn-group">
                <button class="btn-toggle state-off" id="btn-ch-0" onclick="event.stopPropagation(); toggleCmd(0)">關閉</button>
            </div>
        </div>
        <div class="ch-item" id="ch-box-1"
             onmousedown="handleChPressStart(1)" onmouseup="handleChPressEnd()" onmouseleave="handleChPressEnd()"
             ontouchstart="handleChPressStart(1)" ontouchend="handleChPressEnd()">
            <span class="label-ch" id="ch-lbl-1">通道 2</span>
            <div class="btn-group">
                <button class="btn-toggle state-off" id="btn-ch-1" onclick="event.stopPropagation(); toggleCmd(1)">關閉</button>
            </div>
        </div>
        <div class="ch-item" id="ch-box-2"
             onmousedown="handleChPressStart(2)" onmouseup="handleChPressEnd()" onmouseleave="handleChPressEnd()"
             ontouchstart="handleChPressStart(2)" ontouchend="handleChPressEnd()">
            <span class="label-ch" id="ch-lbl-2">通道 3</span>
            <div class="btn-group">
                <button class="btn-toggle state-off" id="btn-ch-2" onclick="event.stopPropagation(); toggleCmd(2)">關閉</button>
            </div>
        </div>
        <div class="ch-item" id="ch-box-3"
             onmousedown="handleChPressStart(3)" onmouseup="handleChPressEnd()" onmouseleave="handleChPressEnd()"
             ontouchstart="handleChPressStart(3)" ontouchend="handleChPressEnd()">
            <span class="label-ch" id="ch-lbl-3">通道 4</span>
            <div class="btn-group">
                <button class="btn-toggle state-off" id="btn-ch-3" onclick="event.stopPropagation(); toggleCmd(3)">關閉</button>
            </div>
        </div>
    </div>

    <!-- 排程設定區塊 -->
    <div class="card">
        <div class="sched-header">
            <span style="font-weight: bold; color: var(--text);">硬體排程同步 (<span id="sched-count">0</span>/40)</span>
            <button class="btn-add" onclick="addSchedule()">+ 新增排程</button>
        </div>
        <div class="sched-list" id="sched-container">
            <!-- 動態生成 -->
        </div>
    </div>

    <div style="text-align:center; font-size:0.7rem; color:#475569; margin-bottom: 10px;" id="tm">--</div>
</div>

<!-- 登入設定彈窗（已拿掉 Broker URL 欄位）[cite: 5] -->
<div id="login-modal" class="modal">
    <div class="modal-content">
        <h3>MQTT 連線設定</h3>
        <div class="form-group">
            <label>MQTT 帳號</label>
            <input type="text" id="inp-user" placeholder="請輸入帳號">
        </div>
        <div class="form-group">
            <label>MQTT 密碼</label>
            <input type="password" id="inp-pass" placeholder="請輸入密碼">
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="chk-remember" checked>
            <label for="chk-remember">記住連線資訊並自動登入</label>
        </div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal()">取消</button>
            <button class="btn-primary" onclick="saveAndConnect()">連線</button>
        </div>
    </div>
</div>

<div id="precision-modal" class="modal">
    <div class="modal-content">
        <h3 id="precision-title">欄位進階設定</h3>
        <div class="form-group">
            <label>顯示名稱 (留空則維持原代碼)</label>
            <input type="text" id="inp-alias" placeholder="例如：濕度">
        </div>
        <div class="form-group">
            <label>請輸入小數位數 (0~4)</label>
            <input type="number" id="inp-precision" min="0" max="4" value="0">
        </div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closePrecisionModal()">取消</button>
            <button class="btn-primary" onclick="savePrecision()">儲存</button>
        </div>
    </div>
</div>

<div id="ch-name-modal" class="modal">
    <div class="modal-content">
        <h3>修改通道名稱</h3>
        <div class="form-group">
            <label id="ch-name-title">通道原名</label>
            <input type="text" id="inp-ch-name" placeholder="例如：抽水馬達">
        </div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeChNameModal()">取消</button>
            <button class="btn-primary" onclick="saveChName()">儲存</button>
        </div>
    </div>
</div>

<script>
    const statBox = document.getElementById('conn-stat');
    const statText = document.getElementById('stat-text');
    const loginModal = document.getElementById('login-modal');
    const precisionModal = document.getElementById('precision-modal');
    const chNameModal = document.getElementById('ch-name-modal');
    const schedContainer = document.getElementById('sched-container');
    const logoutBtn = document.getElementById('btn-logout-ui');
    
    // 固定內嵌的 MQTT Broker 網址[cite: 5]
    const defaultMqttUrl = "wss://y12177fb.ala.asia-southeast1.emqxsl.com:8084/mqtt";
    
    let client = null;
    let autoConnectTimer = null;
    let longPressTimer = null;
    let chLongPressTimer = null;
    
    let fieldConfigs = JSON.parse(localStorage.getItem('field_configs') || '{}');
    let chNames = JSON.parse(localStorage.getItem('ch_names') || '["通道 1", "通道 2", "通道 3", "通道 4"]');
    
    let schedules = [];
    let chStates = [0, 0, 0, 0];
    let currentSettingKey = ''; 
    let currentSettingChId = null;

    window.onload = function() {
        updateChLabels();
        updateChButtonUI(); 
        renderSchedules();

        const savedUser = localStorage.getItem('mqtt_user');
        const savedPass = localStorage.getItem('mqtt_pass');
        const remember = localStorage.getItem('mqtt_remember') === 'true';

        if (savedUser) document.getElementById('inp-user').value = savedUser;
        if (savedPass) document.getElementById('inp-pass').value = savedPass;
        document.getElementById('chk-remember').checked = remember;

        if (remember && savedUser && savedPass) {
            let countdown = 3;
            statText.innerText = `將於 ${countdown} 秒後自動連線...`;
            autoConnectTimer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(autoConnectTimer);
                    startConnect(defaultMqttUrl, savedUser, savedPass);
                } else {
                    statText.innerText = `將於 ${countdown} 秒後自動連線...`;
                }
            }, 1000);
        } else {
            openModal();
        }
    };

    function openModal() { if (autoConnectTimer) clearInterval(autoConnectTimer); loginModal.style.display = 'flex'; }
    function closeModal() { loginModal.style.display = 'none'; if (!client || !client.connected) { statText.innerText = "尚未連線，請點擊設定進行連線"; statBox.style.background = "#334155"; logoutBtn.style.display = "none"; } }

    function saveAndConnect() {
        const user = document.getElementById('inp-user').value.trim();
        const pass = document.getElementById('inp-pass').value.trim();
        const remember = document.getElementById('chk-remember').checked;
        if (!user || !pass) { alert("請填寫所有欄位！"); return; }
        if (remember) { localStorage.setItem('mqtt_user', user); localStorage.setItem('mqtt_pass', pass); localStorage.setItem('mqtt_remember', 'true'); } 
        else { localStorage.removeItem('mqtt_user'); localStorage.removeItem('mqtt_pass'); localStorage.setItem('mqtt_remember', 'false'); }
        closeModal(); startConnect(defaultMqttUrl, user, pass);
    }

    // 登出功能[cite: 5]
    function logout() {
        if (confirm("確定要登出並清除連線資訊嗎？")) {
            if (client) { client.end(); client = null; }
            localStorage.removeItem('mqtt_user');
            localStorage.removeItem('mqtt_pass');
            localStorage.setItem('mqtt_remember', 'false');
            document.getElementById('inp-user').value = "";
            document.getElementById('inp-pass').value = "";
            document.getElementById('data-grid').innerHTML = '<div style="grid-column: span 2; text-align:center; color:#475569;">等待首筆數據...</div>';
            document.getElementById('tm').innerText = "--";
            for (let i = 0; i < 4; i++) {
                const d = document.getElementById('in' + i);
                if(d) d.classList.remove('active');
            }
            schedules = [];
            renderSchedules();
            statText.innerText = "已登出";
            statBox.style.background = "#334155";
            statBox.style.color = "white";
            logoutBtn.style.display = "none";
            openModal();
        }
    }

    function handlePressStart(key) { if (longPressTimer) clearTimeout(longPressTimer); longPressTimer = setTimeout(() => { if (navigator.vibrate) navigator.vibrate([100, 50, 100]); currentSettingKey = key; document.getElementById('precision-title').innerText = `修改 ${key} 設定`; const currentConfig = fieldConfigs[key] || { precision: 0, alias: "" }; document.getElementById('inp-alias').value = currentConfig.alias || ""; document.getElementById('inp-precision').value = currentConfig.precision !== undefined ? currentConfig.precision : 0; precisionModal.style.display = 'flex'; }, 5000); }
    function handlePressEnd() { if (longPressTimer) clearTimeout(longPressTimer); }
    function closePrecisionModal() { precisionModal.style.display = 'none'; }
    function savePrecision() { const pValue = parseInt(document.getElementById('inp-precision').value); const aliasValue = document.getElementById('inp-alias').value.trim(); if (!isNaN(pValue) && pValue >= 0) { fieldConfigs[currentSettingKey] = { precision: pValue, alias: aliasValue }; localStorage.setItem('field_configs', JSON.stringify(fieldConfigs)); } closePrecisionModal(); }

    function handleChPressStart(id) { if (chLongPressTimer) clearTimeout(chLongPressTimer); chLongPressTimer = setTimeout(() => { if (navigator.vibrate) navigator.vibrate([100, 50, 100]); currentSettingChId = id; document.getElementById('ch-name-title').innerText = `請輸入 通道 ${id + 1} 的新名稱：`; document.getElementById('inp-ch-name').value = chNames[id] || `通道 ${id + 1}`; chNameModal.style.display = 'flex'; }, 5000); }
    function handleChPressEnd() { if (chLongPressTimer) clearTimeout(chLongPressTimer); }
    function closeChNameModal() { chNameModal.style.display = 'none'; }
    function saveChName() { const newName = document.getElementById('inp-ch-name').value.trim(); chNames[currentSettingChId] = newName ? newName : `通道 ${currentSettingChId + 1}`; localStorage.setItem('ch_names', JSON.stringify(chNames)); updateChLabels(); renderSchedules(); closeChNameModal(); }

    function updateChLabels() { chNames.forEach((name, i) => { const lbl = document.getElementById('ch-lbl-' + i); if (lbl) lbl.innerText = name; }); }
    function updateChButtonUI() { for (let i = 0; i < 4; i++) { const btn = document.getElementById('btn-ch-' + i); if (btn) { if (chStates[i] === 1) { btn.innerText = "開啟"; btn.className = "btn-toggle state-on"; } else { btn.innerText = "關閉"; btn.className = "btn-toggle state-off"; } } } }

    // --- 排程全新 UI 渲染（支援個別通道設定秒數） ---
    function renderSchedules() {
        document.getElementById('sched-count').innerText = schedules.length;
        schedContainer.innerHTML = '';
        
        if (schedules.length === 0) {
            schedContainer.innerHTML = '<div style="text-align:center; color:#475569; font-size:0.85rem; padding:10px;">目前硬體無任何排程，或正在讀取中...</div>';
            return;
        }

        schedules.forEach((sched, index) => {
            const div = document.createElement('div');
            div.className = 'sched-item';
            
            let chInputsHtml = '';
            for (let i = 0; i < 4; i++) {
                let duration = 0;
                if (sched.dur && sched.dur[i] !== undefined) {
                    duration = sched.dur[i];
                } else if (sched.ch && sched.ch.includes(i)) {
                    duration = 10; 
                }

                chInputsHtml += `
                    <div class="sched-ch-cell">
                        <label>${chNames[i]}</label>
                        <input type="number" min="0" max="86400" placeholder="秒數" value="${duration}" onchange="updateSchedDuration(${index}, ${i}, this.value)">
                    </div>
                `;
            }

            div.innerHTML = `
                <button class="btn-del" onclick="deleteSchedule(${index})">刪除</button>
                <div class="sched-time-row">
                    <div class="sched-time-box">
                        <label>開啟時間</label>
                        <input type="text" placeholder="08:00:00" value="${sched.on}" onchange="updateSchedTime(${index}, 'on', this.value)">
                    </div>
                    <div class="sched-time-box">
                        <label>最大結束時間 (保護用)</label>
                        <input type="text" placeholder="08:05:00" value="${sched.off}" onchange="updateSchedTime(${index}, 'off', this.value)">
                    </div>
                </div>
                <div class="sched-ch-grid">
                    ${chInputsHtml}
                </div>
            `;
            schedContainer.appendChild(div);
        });
    }

    function publishSchedulesToESP32() {
        const savedUser = localStorage.getItem('mqtt_user') || '';
        if (client && client.connected && savedUser.length > 0) {
            client.publish(savedUser + '/cmd/sched_set', JSON.stringify(schedules), {qos: 1, retain: true});
        } else {
            alert("同步失敗，MQTT 連線已中斷");
        }
    }

    function addSchedule() {
        if (schedules.length >= 40) { alert("硬體排程上限為 40 組！"); return; }
        schedules.push({
            on: "08:00:00",
            off: "08:05:00",
            dur: { "0": 0, "1": 0, "2": 0, "3": 0 } 
        });
        renderSchedules(); publishSchedulesToESP32();
    }

    function deleteSchedule(index) { schedules.splice(index, 1); renderSchedules(); publishSchedulesToESP32(); }

    function updateSchedTime(index, field, value) {
        const timeRegex = /^([01]\d|2[0-3]):([0-5]\d):([0-5]\d)$/;
        if (!timeRegex.test(value.trim())) { alert("格式錯誤，請輸入符合 24 小時制的「時:分:秒」"); renderSchedules(); return; }
        schedules[index][field] = value.trim(); publishSchedulesToESP32();
    }

    function updateSchedDuration(index, chId, value) {
        let sec = parseInt(value);
        if (isNaN(sec) || sec < 0) sec = 0;
        if (!schedules[index].dur) schedules[index].dur = { "0": 0, "1": 0, "2": 0, "3": 0 };
        schedules[index].dur[chId] = sec;
        publishSchedulesToESP32();
    }

    // --- 數據通訊與格式化邏輯[cite: 5] ---
    function formatValue(key, rawValue) { const config = fieldConfigs[key] || { precision: 0 }; const targetPrecision = config.precision || 0; const numMatch = String(rawValue).match(/[-+0-9.]+/); if (!numMatch) return rawValue; const numStr = numMatch[0]; const unitStr = String(rawValue).replace(numStr, ''); let parsedNum = parseFloat(numStr); if (isNaN(parsedNum)) return rawValue; if (targetPrecision > 0) parsedNum = parsedNum / Math.pow(10, targetPrecision); return parsedNum.toFixed(targetPrecision) + unitStr; }
    function getDisplayName(key) { const config = fieldConfigs[key]; if (config && config.alias) return config.alias; return key; }

    function startConnect(url, user, pass) {
        if (client) { client.end(); }
        statText.innerText = "正在嘗試連線..."; statBox.style.background = "#334155"; statBox.style.color = "white"; logoutBtn.style.display = "none";
        const options = { username: user, password: pass, clientId: 'iPhone_Auto_' + Math.random().toString(16).substr(2, 4), clean: true, connectTimeout: 10000 };

        try {
            client = mqtt.connect(url, options);
            client.on('connect', () => {
                statText.innerText = "● 雲端連線成功"; statBox.style.background = "#064e3b"; statBox.style.color = "#34d399";
                logoutBtn.style.display = "inline-block"; // 連線成功後顯示登出按鈕[cite: 5]
                client.subscribe(user + '/sensor/data'); client.subscribe(user + '/status/sched_list');
                setTimeout(() => { client.publish(user + '/cmd/sched_req', JSON.stringify({get: 1}), {qos: 1}); }, 500);
            });
            client.on('error', (err) => { statText.innerText = "連線失敗: " + err.message; statBox.style.background = "#7f1d1d"; logoutBtn.style.display = "none"; });
            client.on('close', () => { if(statText.innerText.includes("成功")) { statText.innerText = "連線已斷開"; statBox.style.background = "#334155"; logoutBtn.style.display = "none"; } });
            client.on('message', (topic, msg) => {
                try {
                    if (topic === user + '/status/sched_list') {
                        const rcvSched = JSON.parse(msg.toString());
                        if (Array.isArray(rcvSched)) { schedules = rcvSched; renderSchedules(); }
                        return;
                    }
                    const data = JSON.parse(msg.toString());
                    const grid = document.getElementById('data-grid');
                    let html = '';
                    const sortedKeys = Object.keys(data).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
                    sortedKeys.forEach(k => { if(k.includes('ExtData')) { const displayVal = formatValue(k, data[k]); const displayName = getDisplayName(k); html += `<div class="data-item" onmousedown="handlePressStart('${k}')" onmouseup="handlePressEnd()" onmouseleave="handlePressEnd()" ontouchstart="handlePressStart('${k}')" ontouchend="handlePressEnd()"><b id="val-${k}">${displayVal}</b><br><small>${displayName}</small></div>`; } });
                    if(html) grid.innerHTML = html;
                    if(data.inputs) { data.inputs.forEach((s, i) => { const d = document.getElementById('in' + i); if(d) s ? d.classList.add('active') : d.classList.remove('active'); }); }
                    const currentOutputs = data.outputs || data.relays;
                    if (currentOutputs && Array.isArray(currentOutputs)) { currentOutputs.forEach((s, i) => { if (i < 4) chStates[i] = s ? 1 : 0; }); updateChButtonUI(); }
                    if(data.time) document.getElementById('tm').innerText = "最後更新：" + data.time;
                } catch (e) { console.error("解析 JSON 失敗", e); }
            });
        } catch (e) { statText.innerText = "系統錯誤: " + e.message; statBox.style.background = "#7f1d1d"; logoutBtn.style.display = "none"; }
    }

    function toggleCmd(id) {
        const savedUser = localStorage.getItem('mqtt_user') || '';
        if(client && client.connected && savedUser.length > 0) {
            const nextState = chStates[id] === 1 ? 0 : 1; chStates[id] = nextState; updateChButtonUI();
            client.publish(savedUser + '/cmd/relay', JSON.stringify({id, state: nextState}), {qos: 1});
            if (navigator.vibrate) navigator.vibrate(50);
        } else { alert("連線已中斷，請重新設定連線"); openModal(); }
    }
</script>
</body>
</html>
