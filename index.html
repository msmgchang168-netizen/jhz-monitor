<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JHZ-Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #38bdf8; --accent: #f43f5e; --on: #22c55e; --off: #475569; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; user-select: none; box-sizing: border-box; }
        .container { max-width: 480px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; }
        .status-box { text-align: center; padding: 10px; margin-bottom: 10px; border-radius: 10px; font-weight: bold; font-size: 14px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 15px; }
        .btn { padding: 14px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; color: white; transition: all 0.2s; text-align: center; }
        .btn:disabled { background: #334155 !important; color: #64748b !important; cursor: not-allowed; opacity: 0.6; }
        .btn-primary { background: var(--text); color: var(--bg); }
        .btn-danger { background: var(--accent); }
        .btn-off { background: var(--off); }
        .btn-on { background: var(--on); color: var(--bg); }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 4px; }
        .input-group input, .input-group select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; padding: 15px; box-sizing: border-box; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 18px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
        .sched-item { background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        .sched-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 8px; align-items: center; }
        .sched-col { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex: 1; }
        .sched-col span { font-size: 13px; color: #94a3b8; white-space: nowrap; }
        .sched-col input { width: 10ch; padding: 6px 4px; font-size: 13px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: white; text-align: center; }
        .sched-col input:disabled { background: #0f172a; color: #e2e8f0; border-color: #1e293b; opacity: 0.85; }
        .sched-action-bar { display: flex; gap: 8px; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #1e293b; }
        .btn-mini { padding: 6px 10px; font-size: 12px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; flex: 1; text-align: center; }
        .ch-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--off); display: inline-block; margin-right: 5px; }
        .ch-dot.active { background: var(--on); box-shadow: 0 0 8px var(--on); }
        .tab-buttons { display: flex; gap: 8px; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 8px; }
        .tab-btn { flex: 1; padding: 10px; background: transparent; border: none; color: #94a3b8; font-weight: bold; cursor: pointer; text-align: center; }
        .tab-btn.active { color: var(--text); border-bottom: 3px solid var(--text); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .history-table-wrapper { width: 100%; overflow-x: auto; background: #0f172a; border-radius: 10px; max-height: 250px; overflow-y: auto; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .history-table th { background: #334155; color: var(--text); padding: 8px; position: sticky; top: 0; text-align: left; }
        .history-table td { padding: 8px; border-bottom: 1px solid #1e293b; color: #e2e8f0; }
        .history-table tr:nth-child(even) { background: #131d31; }
        .chart-container { width: 100%; height: 260px; position: relative; }
        .modal-footer-row { display: flex; gap: 8px; margin-top: 5px; }
        .modal-footer-row .btn { padding: 12px 4px; font-size: 14px; flex: 1; }
        
        .cfg-icon {
            position: absolute;
            bottom: 8px;
            right: 10px;
            font-size: 14px;
            color: #64748b;
            cursor: pointer;
            padding: 4px;
            user-select: none;
            transition: color 0.2s;
        }
        .cfg-icon:hover { color: var(--text); }
    </style>
</head>
<body>
<div class="container">
    <div id="stat-box" class="status-box" style="background: #7f1d1d;">未連線</div>
    <div style="text-align: right; margin-bottom: 10px; font-size: 11px; color: #64748b;" id="tm">最後更新：無</div>

    <div id="login-card" class="card">
        <h3 style="margin-top:0; color:var(--text);">JHZ 終端登入</h3>
        <div class="input-group"><label>MQTT 帳號</label><input type="text" id="mq-u"></div>
        <div class="input-group"><label>MQTT 密碼</label><input type="password" id="mq-p"></div>
        <button class="btn btn-primary" style="width:100%" onclick="connectMqtt()">連線控制端</button>
    </div>

    <div id="main-ui" style="display:none;">
        <div class="grid" id="data-grid"></div>
        <div class="tab-buttons">
            <button id="tab-ctrl-btn" class="tab-btn active" onclick="switchTab('ctrl')">設備控制</button>
            <button id="tab-hist-btn" class="tab-btn" onclick="switchTab('hist')">歷史數據日誌</button>
        </div>

        <div id="tab-ctrl" class="tab-content active">
            <div class="card" style="padding:12px;">
                <h4 style="margin:0 0 10px 0; font-size:14px; color:#94a3b8;">數位開關訊號輸入狀態 (IN)</h4>
                <div style="display:flex; justify-content:space-around; text-align:center; font-size:12px;">
                    <div><span id="in0" class="ch-dot"></span><br>IN1</div>
                    <div><span id="in1" class="ch-dot"></span><br>IN2</div>
                    <div><span id="in2" class="ch-dot"></span><br>IN3</div>
                    <div><span id="in3" class="ch-dot"></span><br>IN4</div>
                </div>
            </div>
            <div class="grid" id="ch-grid"></div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn btn-primary" style="flex:1" onclick="openSchedModal()">排程管理</button>
                <button class="btn btn-danger" id="logout-btn" onclick="logout()">中斷連線</button>
            </div>
        </div>

        <div id="tab-hist" class="tab-content">
            <div class="card">
                <h4 style="margin:0 0 12px 0; color:var(--text);">遠端調閱主機內部日誌</h4>
                <div class="grid" style="grid-template-columns: 1.2fr 1fr; gap:8px; margin-bottom:10px;">
                    <div class="input-group" style="margin:0;"><select id="hist-type" onchange="toggleHistUI()"><option value="sensor">RS485環境感測 (720筆/月)</option><option value="action">設備執行紀錄 (3000筆/月)</option></select></div>
                    <div class="input-group" style="margin:0;"><select id="hist-month" onchange="loadHistoryWithCache()"></select></div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-primary" style="flex:1.2; padding:12px;" onclick="requestHistory()">開始調閱下載</button>
                    <button id="btn-export" class="btn btn-on" style="flex:1; padding:12px;" onclick="exportToTxtFile()" disabled>匯出文字檔</button>
                </div>
                <div id="hist-loader" style="text-align:center; margin-top:10px; font-size:12px; color:var(--text); display:none;">正在接收主機大檔案，請稍候...</div>
            </div>
            
            <div class="card" id="hist-chart-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <h4 style="margin:0; font-size:14px; color:#94a3b8;" id="chart-title-text">數據動態趨勢圖</h4>
                    <!-- 這裡的下拉選單會依據「日誌類型」動態變更選項 -->
                    <select id="chart-interval-mode" style="width:160px; padding:4px 8px; border-radius:6px; border:1px solid #334155; background:#0f172a; color:white; font-size:12px;" onchange="renderHistoryOutput()">
                        <option value="hourly">每小時數據</option>
                        <option value="daily-avg">每天平均 (三時段)</option>
                    </select>
                </div>
                <div class="chart-container"><canvas id="sensorChart"></canvas></div>
            </div>
            
            <div class="card"><h4 style="margin:0 0 8px 0; font-size:14px; color:#94a3b8;" id="hist-table-title">歷史日誌明細數據</h4><div class="history-table-wrapper"><table class="history-table"><thead id="hist-thead"></thead><tbody id="hist-tbody"></tbody></table></div></div>
        </div>
    </div>
</div>

<div id="sched-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--text); display:flex; justify-content:space-between; align-items:center;"><span>排程管理</span><span style="cursor:pointer; color:#64748b; font-size:24px;" onclick="closeSchedModal()">✕</span></h3>
        <div id="sched-list-container" style="max-height:55vh; overflow-y:auto; margin-bottom:15px; padding-right:4px;"></div>
        <div class="modal-footer-row">
            <button class="btn btn-primary" onclick="addNewScheduleLine()">＋ 新增排程</button>
            <button class="btn btn-on" onclick="saveAndSendSchedules()">💾 儲存排程</button>
            <button class="btn btn-off" onclick="closeSchedModal()">關閉視窗</button>
        </div>
    </div>
</div>

<div id="cfg-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--text);" id="cfg-title">配置</h3>
        <div class="input-group"><label>顯示別名</label><input type="text" id="cfg-name"></div>
        <div class="input-group"><label>縮放小數位數</label><select id="cfg-prec"><option value="0">不縮放</option><option value="1">除以 10(小數1位)</option><option value="2">除以 100(小數2位)</option></select></div>
        <div id="local-trigger-ui" style="display:none; border-top:1px solid #334155; margin-top:15px; padding-top:10px;">
            <h4 style="margin:0 0 10px 0; color:var(--accent);">本機端離線自動自動觸發設定</h4>
            <div class="input-group"><label>觸發條件邏輯</label><select id="trig-op"><option value="">停用本機自動觸發</option><option value=">">大於 (&gt;)</option><option value="<">小於 (&lt;)</option></select></div>
            <div class="input-group"><label>目標判定數值</label><input type="number" step="0.1" id="trig-val"></div>
            <div class="input-group"><label>滿足條件後自動啟動的排程</label><select id="trig-idx"></select></div>
            <div class="input-group"><label>防重覆觸發冷卻時間 (秒)</label><input type="number" id="trig-cd" value="180" min="180"></div>
        </div>
        <div style="display:flex; gap:10px; margin-top:15px;"><button class="btn btn-on" style="flex:1" onclick="saveFieldConfig()">確認儲存</button><button class="btn btn-off" style="flex:1" onclick="closeCfgModal()">關閉</button></div>
    </div>
</div>

<script>
    let client = null, currentMqttUser = "", fixedMqttUrl = 'wss://y12177fb.ala.asia-southeast1.emqxsl.com:8084/mqtt';
    let chStates = [0, 0, 0, 0], lastInStates = [0, 0, 0, 0], extSchedules = [], editingStates = {}, selectedFieldKey = "";
    let triggerConfigs = {}; 
    
    const defaultConfigs = { 'ExtData1': { name: 'ExtData1', precision: 0 }, 'ExtData2': { name: 'ExtData2', precision: 0 }, 'ch0': { name: '通道 1' }, 'ch1': { name: '通道 2' }, 'ch2': { name: '通道 3' }, 'ch3': { name: '通道 4' } };
    let fieldConfigs = { ...defaultConfigs };
    
    let historyCache = {};
    let sensorChartInstance = null;

    window.onload = function() {
        const savedU = localStorage.getItem('mq_u'), savedP = localStorage.getItem('mq_p');
        if(savedU) document.getElementById('mq-u').value = savedU; if(savedP) document.getElementById('mq-p').value = savedP;
        setupMonthDropdown(); updateChButtonUI();
        if(savedU && savedP) { setTimeout(() => { connectMqtt(); }, 1500); }
    };

    function setupMonthDropdown() {
        const dropdown = document.getElementById('hist-month'); dropdown.innerHTML = ""; const now = new Date();
        for (let i = 0; i < 6; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const opt = document.createElement('option'); opt.value = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}`;
            opt.innerText = `${d.getFullYear()}年${String(d.getMonth() + 1).padStart(2, '0')}月`; dropdown.appendChild(opt);
        }
    }

    function switchTab(t) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        if (t === 'ctrl') { document.getElementById('tab-ctrl-btn').classList.add('active'); document.getElementById('tab-ctrl').classList.add('active'); }
        else { document.getElementById('tab-hist-btn').classList.add('active'); document.getElementById('tab-hist').classList.add('active'); toggleHistUI(); }
    }

    // 【修改】切換日誌類型時，同步切換圖表模式的下拉選單選項
    function toggleHistUI() { 
        const typeSelect = document.getElementById('hist-type').value;
        const isSensor = (typeSelect === 'sensor');
        
        // 永遠讓圖表 Card 顯示
        document.getElementById('hist-chart-card').style.display = 'block'; 
        
        // 動態重構圖表間隔模式下拉選單
        const intervalModeSelect = document.getElementById('chart-interval-mode');
        const prevVal = intervalModeSelect.value;
        intervalModeSelect.innerHTML = "";

        if (isSensor) {
            document.getElementById('chart-title-text').innerText = "環境數據趨勢圖";
            intervalModeSelect.innerHTML = `
                <option value="hourly">每小時數據</option>
                <option value="daily-avg">每天平均 (三時段)</option>`;
            // 嘗試保留原本的環境選項
            if (prevVal === 'hourly' || prevVal === 'daily-avg') {
                intervalModeSelect.value = prevVal;
            } else {
                intervalModeSelect.value = 'hourly';
            }
        } else {
            document.getElementById('chart-title-text').innerText = "設備執行統計圖";
            intervalModeSelect.innerHTML = `
                <option value="daily-count">每日啟動次數 (不計手動)</option>
                <option value="daily-duration">每日執行秒數 (不計手動)</option>`;
            if (prevVal === 'daily-count' || prevVal === 'daily-duration') {
                intervalModeSelect.value = prevVal;
            } else {
                intervalModeSelect.value = 'daily-count';
            }
        }

        if (sensorChartInstance) {
            sensorChartInstance.destroy();
            sensorChartInstance = null;
        }

        loadHistoryWithCache();
    }

    function loadHistoryWithCache() {
        const type = document.getElementById('hist-type').value;
        const month = document.getElementById('hist-month').value;
        const cacheKey = `${type}_${month}`;

        if (historyCache[cacheKey]) {
            document.getElementById('hist-loader').style.display = 'none';
            renderHistoryOutput();
        } else {
            requestHistory();
        }
    }

    function connectMqtt() {
        const u = document.getElementById('mq-u').value.trim(), p = document.getElementById('mq-p').value.trim(); if(!u) return;
        currentMqttUser = u; localStorage.setItem('mq_u', u); localStorage.setItem('mq_p', p);
        const sb = document.getElementById('stat-box'); sb.innerText = "驗證中..."; sb.style.background = "#b45309";
        client = mqtt.connect(fixedMqttUrl, { clientId: 'JHZ_M_' + Math.random().toString(16).substr(2, 5), username: u, password: p, clean: true, reconnectPeriod: 4000 });
        client.on('connect', () => {
            sb.innerText = `連線成功：【${u}】`; sb.style.background = "var(--on)"; sb.style.color = "var(--bg)";
            document.getElementById('login-card').style.display = 'none'; document.getElementById('main-ui').style.display = 'block';
            
            const accountConfigs = localStorage.getItem(u + '_field_cfgs');
            if (accountConfigs) {
                fieldConfigs = JSON.parse(accountConfigs);
            } else {
                fieldConfigs = { ...defaultConfigs };
            }
            updateChButtonUI();

            client.subscribe(`${u}/sensor/data`); 
            client.subscribe(`${u}/status/sched_list`); 
            client.subscribe(`${u}/res/history`);
            client.subscribe(`${u}/status/trigger_list`); 

            client.publish(`${u}/cmd/sched_req`, JSON.stringify({get: 1})); 
            client.publish(`${u}/cmd/ext_trigger_req`, JSON.stringify({get: 1})); 
            startIdleMonitor();
        });
        client.on('message', (topic, payload) => {
            const str = payload.toString();
            if (topic === `${currentMqttUser}/res/history`) { handleHistoryIncomingPacket(str); return; }
            if (topic === `${currentMqttUser}/status/sched_list`) { try { extSchedules = JSON.parse(str); buildTriggerScheduleSelectUI(); if(document.getElementById('sched-modal').style.display==='flex') renderSchedListItems(); } catch(e){} return; }
            if (topic === `${currentMqttUser}/status/trigger_list`) { try { triggerConfigs = JSON.parse(str); console.log("已成功載入 ESP32 觸發條件:", triggerConfigs); } catch(e){} return; }
            try {
                const data = JSON.parse(str); let html = "";
                Object.keys(data).forEach(k => {
                    if(k.startsWith('ExtData')) {
                        const conf = fieldConfigs[k] || { name: k, precision: 0 };
                        let val = parseFloat(data[k]); if(conf.precision > 0) val = (val / Math.pow(10, conf.precision)).toFixed(conf.precision);
                        html += `
                            <div class="card" style="text-align:center; padding:12px; margin:0;">
                                <b style="font-size:20px; color:var(--text);">${val}</b><br>
                                <small style="color:#94a3b8;">${conf.name}</small>
                                <span class="cfg-icon" ondblclick="openConfigModalWithTriggerFromKey('${k}')">⚙️</span>
                            </div>`;
                    }
                });
                if(html) document.getElementById('data-grid').innerHTML = html;
                
                if(data.inputs && Array.isArray(data.inputs)) { 
                    data.inputs.forEach((s, i) => { 
                        if(i < 4) {
                            const d = document.getElementById('in'+i); 
                            if(d) s ? d.classList.add('active') : d.classList.remove('active'); 
                            
                            const currentState = s ? 1 : 0;
                            if (currentState !== lastInStates[i]) {
                                lastInStates[i] = currentState;
                                if(client && client.connected) {
                                    chStates[i] = currentState;
                                    updateChButtonUI();
                                    client.publish(`${currentMqttUser}/cmd/relay`, JSON.stringify({id: i, state: currentState}));
                                }
                            }
                        }
                    }); 
                }
                
                const outs = data.outputs || data.relays; if(outs && Array.isArray(outs)) { outs.forEach((s, i) => { if(i<4) chStates[i]=s?1:0; }); updateChButtonUI(); }
                if(data.time) document.getElementById('tm').innerText = "最後更新：" + data.time;
            } catch(e){}
        });
    }

    function requestHistory() {
        if (!client || !client.connected) return;
        const type = document.getElementById('hist-type').value;
        const month = document.getElementById('hist-month').value;
        const cacheKey = `${type}_${month}`;

        document.getElementById('btn-export').disabled = true; 
        document.getElementById('hist-loader').style.display = 'block'; 
        
        historyCache[cacheKey] = [];
        client.publish(`${currentMqttUser}/cmd/history_req`, JSON.stringify({ type: type, month: month }));
    }

    function handleHistoryIncomingPacket(str) {
        try {
            const data = JSON.parse(str);
            const type = document.getElementById('hist-type').value;
            const month = document.getElementById('hist-month').value;
            const cacheKey = `${type}_${month}`;
            
            if (data.status === 'NODATA') { 
                document.getElementById('hist-loader').style.display = 'none'; 
                alert('該月份無任何日誌檔案！'); 
                historyCache[cacheKey] = []; 
                renderHistoryOutput(); 
                return; 
            }
            if (data.status === 'EOF') { 
                document.getElementById('hist-loader').style.display = 'none'; 
                renderHistoryOutput(); 
                return; 
            }
            
            if (Array.isArray(data)) {
                if (!historyCache[cacheKey]) historyCache[cacheKey] = [];
                historyCache[cacheKey] = historyCache[cacheKey].concat(data);
            }
        } catch(e){}
    }

    // 【修改】整合「環境感測」與「設備執行日誌」雙統計圖表生成邏輯
    function renderHistoryOutput() {
        const type = document.getElementById('hist-type').value;
        const month = document.getElementById('hist-month').value;
        const cacheKey = `${type}_${month}`;
        const thead = document.getElementById('hist-thead'), tbody = document.getElementById('hist-tbody');
        
        thead.innerHTML = ""; tbody.innerHTML = "";
        const targetPackets = historyCache[cacheKey] || [];

        if (targetPackets.length === 0) { 
            tbody.innerHTML = "<tr><td style='text-align:center;'>目前尚無任何日誌。可點選「開始調閱下載」。</td></tr>"; 
            document.getElementById('btn-export').disabled = true;
            if (sensorChartInstance) {
                sensorChartInstance.destroy();
                sensorChartInstance = null;
            }
            return; 
        }

        document.getElementById('btn-export').disabled = false;

        if (type === 'sensor') {
            const n1 = fieldConfigs['ExtData1']?.name || '晶片1', n2 = fieldConfigs['ExtData2']?.name || '晶片2';
            const p1 = fieldConfigs['ExtData1']?.precision || 0, p2 = fieldConfigs['ExtData2']?.precision || 0;
            document.getElementById('hist-table-title').innerText = "環境數據報表";
            thead.innerHTML = `<tr><th>時間</th><th>${n1}</th><th>${n2}</th></tr>`;
            
            let rawDataList = []; 

            for (let i = targetPackets.length - 1; i >= 0; i--) {
                const cols = targetPackets[i].split(','); if (cols.length < 4) continue;
                let dateStr = `20${cols[0].substring(0,2)}-${cols[0].substring(2,4)}-${cols[0].substring(4,6)}`;
                let timeStr = `${cols[1].substring(0,2)}:${cols[1].substring(2,4)}`;
                let fTime = `${dateStr} ${timeStr}`;
                let v1 = p1 > 0 ? (parseFloat(cols[2]) / Math.pow(10, p1)).toFixed(p1) : parseFloat(cols[2]).toFixed(0);
                let v2 = p2 > 0 ? (parseFloat(cols[3]) / Math.pow(10, p2)).toFixed(p2) : parseFloat(cols[3]).toFixed(0);
                
                tbody.innerHTML += `<tr><td>${fTime}</td><td>${v1}</td><td>${v2}</td></tr>`;
                
                rawDataList.push({ date: dateStr, time: timeStr, v1: parseFloat(v1), v2: parseFloat(v2) });
            }

            const chartMode = document.getElementById('chart-interval-mode').value;
            if (chartMode === 'hourly') {
                let labels = rawDataList.map(item => item.date.slice(5) + " " + item.time).reverse();
                let d1 = rawDataList.map(item => item.v1).reverse();
                let d2 = rawDataList.map(item => item.v2).reverse();
                buildSensorChart(labels.slice(-48), [
                    { label: n1, data: d1.slice(-48), color: '#38bdf8' }, 
                    { label: n2, data: d2.slice(-48), color: '#f43f5e' }
                ]);
            } else {
                generateDailyShiftAverageChart(rawDataList, n1, n2);
            }
        } else {
            // ----- 設備執行紀錄處理 -----
            document.getElementById('hist-table-title').innerText = "設備事件觸發日誌";
            thead.innerHTML = "<tr><th>時間</th><th>觸發源</th><th>任務標記</th><th>CH1</th><th>CH2</th><th>CH3</th><th>CH4</th></tr>";
            
            let actionDataList = [];

            for (let i = targetPackets.length - 1; i >= 0; i--) {
                const cols = targetPackets[i].split(','); if (cols.length < 8) continue;
                let dateStr = `20${cols[0].substring(0,2)}-${cols[0].substring(2,4)}-${cols[0].substring(4,6)}`;
                let fTime = `${dateStr} ${cols[1].substring(0,2)}:${cols[1].substring(2,4)}:${cols[1].substring(4,6)}`;
                
                tbody.innerHTML += `<tr><td>${fTime}</td><td style="color:var(--text);font-weight:bold;">${cols[2]}</td><td>${cols[3]}</td><td>${cols[4]=='9999'?'開啟':cols[4]+'秒'}</td><td>${cols[5]=='9999'?'開啟':cols[5]+'秒'}</td><td>${cols[6]=='9999'?'開啟':cols[6]+'秒'}</td><td>${cols[7]=='9999'?'開啟':cols[7]+'秒'}</td></tr>`;
                
                actionDataList.push({
                    date: dateStr,
                    triggerSource: cols[2], // 觸發源
                    chVals: [
                        parseInt(cols[4]), // CH1 秒數或 9999
                        parseInt(cols[5]), // CH2
                        parseInt(cols[6]), // CH3
                        parseInt(cols[7])  // CH4
                    ]
                });
            }

            // 呼叫設備日誌圖表產生器
            generateActionDailyChart(actionDataList);
        }
    }

    // 【新增】產生設備事件每日統計圖表（排除手動觸發）
    function generateActionDailyChart(actionDataList) {
        let dailyStats = {}; // 格式: { '2026-07-01': { count: [0,0,0,0], duration: [0,0,0,0] } }

        actionDataList.forEach(item => {
            const date = item.date;
            const src = item.triggerSource.trim().toLowerCase();
            
            // 【篩選】如果觸發源是手動 (manual/手動/man)，則不計入圖表統計
            if (src === 'manual' || src === 'man' || src === '手動') {
                return;
            }

            if (!dailyStats[date]) {
                dailyStats[date] = {
                    count: [0, 0, 0, 0],
                    duration: [0, 0, 0, 0]
                };
            }

            for (let ch = 0; ch < 4; ch++) {
                const val = item.chVals[ch];
                if (val > 0) {
                    // 只要大於 0 秒，就代表啟動了 1 次
                    dailyStats[date].count[ch] += 1;

                    // 累加執行時間：如果數值是 9999 (代表常開/非定時器)，不累加至總秒數，避免圖表爆表
                    if (val !== 9999) {
                        dailyStats[date].duration[ch] += val;
                    }
                }
            }
        });

        const sortedDates = Object.keys(dailyStats).sort();
        const labels = sortedDates.map(d => d.slice(5)); // 取 MM-DD

        const chNames = [
            fieldConfigs['ch0']?.name || 'CH1',
            fieldConfigs['ch1']?.name || 'CH2',
            fieldConfigs['ch2']?.name || 'CH3',
            fieldConfigs['ch3']?.name || 'CH4'
        ];
        const colors = ['#38bdf8', '#fbbf24', '#34d399', '#f43f5e']; // 各通道代表色

        const chartMode = document.getElementById('chart-interval-mode').value;
        let datasets = [];

        for (let ch = 0; ch < 4; ch++) {
            let chData = [];
            sortedDates.forEach(d => {
                if (chartMode === 'daily-count') {
                    chData.push(dailyStats[d].count[ch]);
                } else {
                    chData.push(dailyStats[d].duration[ch]);
                }
            });

            datasets.push({
                label: chNames[ch],
                data: chData,
                borderColor: colors[ch],
                backgroundColor: colors[ch] + "1A",
                borderWidth: 2,
                tension: 0.1,
                pointRadius: 3,
                spanGaps: true
            });
        }

        // 重新繪製 Line Chart
        const ctx = document.getElementById('sensorChart').getContext('2d');
        if (sensorChartInstance) sensorChartInstance.destroy();

        sensorChartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels: labels, datasets: datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#94a3b8', font: { size: 9 } } },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) label += ': ';
                                if (context.parsed.y !== null) {
                                    label += context.parsed.y + (chartMode === 'daily-count' ? ' 次' : ' 秒');
                                }
                                return label;
                            }
                        }
                    }
                },
                scales: {
                    x: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { color: '#1e293b' } },
                    y: { 
                        ticks: { color: '#64748b', font: { size: 9 } }, 
                        grid: { color: '#1e293b' },
                        title: {
                            display: true,
                            text: chartMode === 'daily-count' ? '自動執行次數' : '自動執行總時間 (秒)',
                            color: '#94a3b8',
                            font: { size: 10 }
                        }
                    }
                }
            }
        });
    }

    function generateDailyShiftAverageChart(rawDataList, name1, name2) {
        let dailyGroups = {};
        rawDataList.forEach(item => {
            let d = item.date;
            if (!dailyGroups[d]) {
                dailyGroups[d] = {
                    shift1: { sum1: 0, sum2: 0, count: 0 }, 
                    shift2: { sum1: 0, sum2: 0, count: 0 }, 
                    shift3: { sum1: 0, sum2: 0, count: 0 }  
                };
            }
            let hm = item.time; 

            if (hm >= "08:00" && hm <= "15:59") {
                dailyGroups[d].shift1.sum1 += item.v1;
                dailyGroups[d].shift1.sum2 += item.v2;
                dailyGroups[d].shift1.count++;
            } else if (hm >= "16:00" && hm <= "23:59") {
                dailyGroups[d].shift2.sum1 += item.v1;
                dailyGroups[d].shift2.sum2 += item.v2;
                dailyGroups[d].shift2.count++;
            } else if (hm >= "00:00" && hm <= "07:59") {
                dailyGroups[d].shift3.sum1 += item.v1;
                dailyGroups[d].shift3.sum2 += item.v2;
                dailyGroups[d].shift3.count++;
            }
        });

        let sortedDates = Object.keys(dailyGroups).sort();
        
        let labels = [];
        let s1_v1 = [], s1_v2 = [];
        let s2_v1 = [], s2_v2 = [];
        let s3_v1 = [], s3_v2 = [];

        sortedDates.forEach(d => {
            labels.push(d.slice(5)); 
            let group = dailyGroups[d];

            s1_v1.push(group.shift1.count > 0 ? (group.shift1.sum1 / group.shift1.count).toFixed(2) : null);
            s1_v2.push(group.shift1.count > 0 ? (group.shift1.sum2 / group.shift1.count).toFixed(2) : null);

            s2_v1.push(group.shift2.count > 0 ? (group.shift2.sum1 / group.shift2.count).toFixed(2) : null);
            s2_v2.push(group.shift2.count > 0 ? (group.shift2.sum2 / group.shift2.count).toFixed(2) : null);

            s3_v1.push(group.shift3.count > 0 ? (group.shift3.sum1 / group.shift3.count).toFixed(2) : null);
            s3_v2.push(group.shift3.count > 0 ? (group.shift3.sum2 / group.shift3.count).toFixed(2) : null);
        });

        let datasets = [
            { label: `${name1} (08:00-15:59)`, data: s1_v1, color: '#38bdf8', dash: [] },
            { label: `${name1} (16:00-23:59)`, data: s2_v1, color: '#0ea5e9', dash: [5, 5] },
            { label: `${name1} (00:00-07:59)`, data: s3_v1, color: '#1e3a8a', dash: [2, 2] },
            { label: `${name2} (08:00-15:59)`, data: s1_v2, color: '#f43f5e', dash: [] },
            { label: `${name2} (16:00-23:59)`, data: s2_v2, color: '#ec4899', dash: [5, 5] },
            { label: `${name2} (00:00-07:59)`, data: s3_v2, color: '#9d174d', dash: [2, 2] }
        ];

        buildSensorChart(labels, datasets);
    }

    function buildSensorChart(labels, datasetsConfig) {
        const ctx = document.getElementById('sensorChart').getContext('2d'); 
        if (sensorChartInstance) sensorChartInstance.destroy();

        let formattedDatasets = datasetsConfig.map(ds => {
            return {
                label: ds.label,
                data: ds.data,
                borderColor: ds.color,
                backgroundColor: ds.color + "1A", 
                borderWidth: 2,
                tension: 0.2,
                pointRadius: 2,
                borderDash: ds.dash || [], 
                spanGaps: true 
            };
        });

        sensorChartInstance = new Chart(ctx, { 
            type: 'line', 
            data: { 
                labels: labels, 
                datasets: formattedDatasets 
            }, 
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { 
                    legend: { 
                        labels: { color: '#94a3b8', font: { size: 9 } } 
                    } 
                }, 
                scales: { 
                    x: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { color: '#1e293b' } }, 
                    y: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { color: '#1e293b' } } 
                } 
            } 
        });
    }

    function exportToTxtFile() {
        const type = document.getElementById('hist-type').value;
        const month = document.getElementById('hist-month').value;
        const cacheKey = `${type}_${month}`;
        const targetPackets = historyCache[cacheKey] || [];
        if (targetPackets.length === 0) return;
        
        let content = "";

        const getWidth = (str) => Array.from(str).reduce((acc, char) => acc + (char.charCodeAt(0) > 255 ? 2 : 1), 0);
        const padRight = (str, width) => { const w = getWidth(str); return w >= width ? str : str + " ".repeat(width - w); };

        if (type === 'sensor') {
            const n1 = fieldConfigs['ExtData1']?.name || 'ExtData1', n2 = fieldConfigs['ExtData2']?.name || 'ExtData2';
            const p1 = fieldConfigs['ExtData1']?.precision || 0, p2 = fieldConfigs['ExtData2']?.precision || 0;
            content += `歷史環境數據日誌報告 (月份: ${month})\r\n\r\n`;
            content += padRight("記錄時間", 22) + " , " + padRight(n1, 16) + " , " + padRight(n2, 16) + "\r\n";
            content += "-".repeat(60) + "\r\n";
            for (let i = targetPackets.length - 1; i >= 0; i--) {
                const cols = targetPackets[i].split(','); if (cols.length < 4) continue;
                let fTime = `20${cols[0].substring(0,2)}-${cols[0].substring(2,4)}-${cols[0].substring(4,6)} ${cols[1].substring(0,2)}:${cols[1].substring(2,4)}`;
                let v1 = p1 > 0 ? (parseFloat(cols[2]) / Math.pow(10, p1)).toFixed(p1) : parseFloat(cols[2]).toFixed(0);
                let v2 = p2 > 0 ? (parseFloat(cols[3]) / Math.pow(10, p2)).toFixed(p2) : parseFloat(cols[3]).toFixed(0);
                content += padRight(fTime, 22) + " , " + padRight(v1, 16) + " , " + padRight(v2, 16) + "\r\n";
            }
        } else {
            content += `設備執行事件日誌報告 (月份: ${month})\r\n\r\n`;
            content += padRight("執行時間", 22) + " , " + padRight("觸發源", 12) + " , " + padRight("任務標記", 16) + " , " + padRight("CH1", 10) + " , " + padRight("CH2", 10) + " , " + padRight("CH3", 10) + " , " + padRight("CH4", 10) + "\r\n";
            content += "-".repeat(105) + "\r\n";
            for (let i = targetPackets.length - 1; i >= 0; i--) {
                const cols = targetPackets[i].split(','); if (cols.length < 8) continue;
                let fTime = `20${cols[0].substring(0,2)}-${cols[0].substring(2,4)}-${cols[0].substring(4,6)} ${cols[1].substring(0,2)}:${cols[1].substring(2,4)}:${cols[1].substring(4,6)}`;
                let c1 = cols[4] === '9999' ? '開啟' : `${cols[4]}秒`, c2 = cols[5] === '9999' ? '開啟' : `${cols[5]}秒`;
                let c3 = cols[6] === '9999' ? '開啟' : `${cols[6]}秒`, c4 = cols[7] === '9999' ? '開啟' : `${cols[7]}秒`;
                content += padRight(fTime, 22) + " , " + padRight(cols[2], 12) + " , " + padRight(cols[3], 16) + " , " + padRight(c1, 10) + " , " + padRight(c2, 10) + " , " + padRight(c3, 10) + " , " + padRight(c4, 10) + "\r\n";
            }
        }
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `JHZ_Log_${type}_${month}.txt`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    }

    function buildTriggerScheduleSelectUI() { const s = document.getElementById('trig-idx'); if(!s) return; s.innerHTML = '<option value="-1">請選擇排程時段</option>'; extSchedules.forEach((x, i) => { s.innerHTML += `<option value="${i}">排程時段 ${i + 1} (${x.on})</option>`; }); }
    
    function saveFieldConfig() { 
        const n = document.getElementById('cfg-name').value.trim(); if(!n) return; 
        if(!fieldConfigs[selectedFieldKey]) fieldConfigs[selectedFieldKey] = {}; 
        fieldConfigs[selectedFieldKey].name = n;

            fieldConfigs[selectedFieldKey].precision = parseInt(document.getElementById('cfg-prec').value); 
            const op = document.getElementById('trig-op').value, val = parseFloat(document.getElementById('trig-val').value) || 0.0, idx = parseInt(document.getElementById('trig-idx').value), cd = parseInt(document.getElementById('trig-cd').value) || 180; 
            
            if ((op === "" || (op !== "" && idx >= 0)) && client && client.connected) { 
                client.publish(`${currentMqttUser}/cmd/ext_trigger_set`, JSON.stringify({ field: selectedFieldKey, op: op, val: val, sched_idx: idx, cooldown: cd })); 
            } else if (op !== "" && idx < 0) {
                alert("請選擇滿足條件後要自動啟動的排程時段！");

        localStorage.setItem(currentMqttUser + '_field_cfgs', JSON.stringify(fieldConfigs));

    }

    function openSchedModal() { editingStates = {}; document.getElementById('sched-modal').style.display = 'flex'; renderSchedListItems(); }
    function closeSchedModal() { document.getElementById('sched-modal').style.display = 'none'; }
    function validateTimeFormat(el) { const val = el.value.trim(), reg = /^([0-1][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]$/; if (!reg.test(val)) { alert("時間格式錯誤！例如：08:00:00"); setTimeout(() => { el.focus(); }, 10); return false; } return true; }

    function renderSchedListItems() {
        const c = document.getElementById('sched-list-container'); c.innerHTML = ""; if(extSchedules.length === 0) { c.innerHTML = "<p style='color:#64748b; text-align:center; font-size:13px;'>目前無排程資料</p>"; return; }
        extSchedules.forEach((s, i) => {
            const isEd = !!editingStates[i], dis = isEd ? "" : "disabled";
            const btnHtml = !isEd ? `<button class="btn-mini btn-primary" onclick="setSchedEditMode(${i}, true)">✏️ 編輯</button><button class="btn-mini btn-on" style="background:#0f766e; color:white;" onclick="runSingleSchedNow(${i})">⚡ 測試</button><button class="btn-mini btn-danger" style="flex:0.5; padding:6px 0;" onclick="deleteSchedLine(${i})">✕ 刪除</button>` : `<button class="btn-mini btn-on" onclick="confirmSchedEdit(${i})">💾 確定</button><button class="btn-mini btn-off" onclick="setSchedEditMode(${i}, false)">✖️ 取消</button>`;
            c.innerHTML += `<div class="sched-item" style="${isEd ? 'border-color: var(--text);' : ''}"><div style='margin-bottom:8px; font-size:14px;'><b style='color:${isEd?'var(--text)':'#94a3b8'}'>排程時段 #${i+1}</b></div><div class="sched-row"><div class="sched-col"><span>開啟</span><input type="text" id="s-on-${i}" value="${s.on||''}" placeholder="08:00:00" ${dis} onblur="validateTimeFormat(this)"></div><div class="sched-col"><span>結束</span><input type="text" id="s-off-${i}" value="${s.off||''}" placeholder="08:05:00" ${dis} onblur="validateTimeFormat(this)"></div></div><div class="sched-row"><div class="sched-col"><span>${fieldConfigs['ch0']?.name||'CH1'}</span><input type="number" id="s-dur-${i}-0" value="${s.dur?(s.dur[0]||0):0}" ${dis}></div><div class="sched-col"><span>${fieldConfigs['ch1']?.name||'CH2'}</span><input type="number" id="s-dur-${i}-1" value="${s.dur?(s.dur[1]||0):0}" ${dis}></div></div><div class="sched-row"><div class="sched-col"><span>${fieldConfigs['ch2']?.name||'CH3'}</span><input type="number" id="s-dur-${i}-2" value="${s.dur?(s.dur[2]||0):0}" ${dis}></div><div class="sched-col"><span>${fieldConfigs['ch3']?.name||'CH4'}</span><input type="number" id="s-dur-${i}-3" value="${s.dur?(s.dur[3]||0):0}" ${dis}></div></div><div class="sched-action-bar">${btnHtml}</div></div>`;
        });
    }
    function setSchedEditMode(i, e) { editingStates[i] = e; renderSchedListItems(); }
    function confirmSchedEdit(i) { const onEl = document.getElementById(`s-on-${i}`), offEl = document.getElementById(`s-off-${i}`); if(!validateTimeFormat(onEl) || !validateTimeFormat(offEl)) return; extSchedules[i].on = onEl.value.trim(); extSchedules[i].off = offEl.value.trim(); if(!extSchedules[i].dur) extSchedules[i].dur = {}; for(let j=0; j<4; j++) extSchedules[i].dur[j] = parseInt(document.getElementById(`s-dur-${i}-${j}`).value) || 0; editingStates[i] = false; renderSchedListItems(); }
    function addNewScheduleLine() { if(extSchedules.length >= 40) return; editingStates[extSchedules.length] = true; extSchedules.push({ on: "08:00:00", off: "08:05:00", dur: { "0": 0, "1": 0, "2": 0, "3": 0 } }); renderSchedListItems(); }
    function deleteSchedLine(i) { if(confirm(`確定刪除排程 #${i+1}？`)) { extSchedules.splice(i, 1); delete editingStates[i]; renderSchedListItems(); } }
    function runSingleSchedNow(i) { if(!client || !client.connected) return; const s = extSchedules[i]; client.publish(`${currentMqttUser}/cmd/sched_run`, JSON.stringify({dur: { "0": s.dur?(s.dur[0]||0):0, "1": s.dur?(s.dur[1]||0):0, "2": s.dur?(s.dur[2]||0):0, "3": s.dur?(s.dur[3]||0):0 }})); }
    function saveAndSendSchedules() { if(!client || !client.connected || Object.keys(editingStates).some(k => editingStates[k])) return; client.publish(`${currentMqttUser}/cmd/sched_set`, JSON.stringify(extSchedules), {qos: 1, retain: true}); alert('儲存完成'); closeSchedModal(); }

    let idleTimer = null;
    function startIdleMonitor() { const timeout = 3 * 60 * 1000; const reset = () => { if(idleTimer) clearTimeout(idleTimer); if(client && client.connected) idleTimer = setTimeout(() => { logout(); alert('閒置逾 3 分鐘，已自動斷線。'); }, timeout); }; ['click', 'touchstart'].forEach(e => window.addEventListener(e, reset)); reset(); }
    
    function logout() { 
        if(client) try{client.end();}catch(e){} 
        document.getElementById('main-ui').style.display = 'none';
